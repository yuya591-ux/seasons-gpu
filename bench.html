<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#14161c" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <title>窓のむこう β — 発熱くらべ（WebGL / WebGPU）</title>
    <style>
      html, body { margin: 0; height: 100%; background: #14161c; color: #e8e4da; font-family: system-ui, sans-serif; overflow: hidden; }
      #cv { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
      #menu { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 14px; padding: 24px; text-align: center; background: #14161c; z-index: 2; }
      #menu h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; letter-spacing: 0.06em; }
      #menu p { font-size: 12.5px; line-height: 1.9; color: #b8b2a6; margin: 0; max-width: 34em; text-align: left; }
      #menu button { font-size: 16px; padding: 14px 26px; min-width: 240px; border-radius: 12px; border: 1px solid #4a4536; background: #24272f; color: #f0ead9; }
      #menu button:active { background: #33373f; }
      #gpuNote { font-size: 11.5px; color: #8a8478; }
      #hud { position: fixed; left: 10px; top: max(10px, env(safe-area-inset-top)); z-index: 3; font-size: 13px; line-height: 1.8; background: rgba(10, 12, 16, 0.72); padding: 10px 14px; border-radius: 10px; white-space: pre; display: none; }
      #done { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 10px; background: rgba(10, 12, 16, 0.88); z-index: 4; text-align: center; padding: 24px; }
      #done h2 { font-size: 17px; margin: 0; }
      #done pre { font-size: 14px; line-height: 2; margin: 0; text-align: left; }
      #done small { color: #b8b2a6; line-height: 1.8; }
    </style>
  </head>
  <body>
    <canvas id="cv"></canvas>
    <div id="menu">
      <h1>発熱くらべ — WebGL / WebGPU</h1>
      <p>
        窓辺とおなじ規模の絵（描画コール約2100・三角形約80万・毎秒30コマ）を5分間描き続けます。<br />
        手順: ① 画面の明るさを50%に固定・低電力モードは切る・充電しない ② 開始時の電池残量をメモ
        ③ 5分後、電池残量と本体背面の温かさ（気にならない/ぬるい/熱い）を記録 ④ 10分ほど休ませてから、もう一方も同じ条件で。
      </p>
      <button id="btnGL" type="button">WebGL で5分計測（いまの方式）</button>
      <button id="btnGPU" type="button">WebGPU で5分計測（新しい方式）</button>
      <div id="gpuNote"></div>
    </div>
    <div id="hud"></div>
    <div id="done">
      <h2>計測おわり</h2>
      <pre id="doneStats"></pre>
      <small>電池残量と背面の温かさを記録したら、この画面は閉じてかまいません。</small>
      <button id="btnBack" type="button" style="font-size:15px;padding:10px 22px;border-radius:10px;border:1px solid #4a4536;background:#24272f;color:#f0ead9;">もどる</button>
    </div>
    <script type="module" src="./src/bench.js"></script>
  </body>
</html>
