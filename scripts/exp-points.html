<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>実験: WebGPUでのPoints描画（移植調査用・一時ファイル）</title>
    <style>html,body{margin:0;background:#101216}</style>
  </head>
  <body>
    <canvas id="cv"></canvas>
    <script type="module">
      // 目的: WebGPURenderer で THREE.Points がどう描けるかを実測する（星空/ほこり/花火などの移植方針を決める）。
      // A: 従来の PointsMaterial（size + sizeAttenuation）
      // B: PointsNodeMaterial（TSL、sizeNode 等）
      // 結果は window.__exp に集約（Playwright から読む）。
      const out = { errors: [], notes: [] }
      window.__exp = null
      try {
        const THREE = await import('three/webgpu')
        const TSL = await import('three/tsl')
        const renderer = new THREE.WebGPURenderer({ canvas: document.getElementById('cv'), antialias: false })
        await renderer.init()
        renderer.setPixelRatio(1)
        renderer.setSize(640, 400, false)
        out.backend = renderer.backend && renderer.backend.isWebGPUBackend ? 'webgpu' : 'webgl2代替'
        const scene = new THREE.Scene()
        scene.background = new THREE.Color(0x101216)
        const cam = new THREE.PerspectiveCamera(60, 640 / 400, 0.1, 100)
        cam.position.set(0, 0, 10)

        // A: 従来 PointsMaterial（赤）。左側に2点。
        try {
          const g = new THREE.BufferGeometry()
          g.setAttribute('position', new THREE.Float32BufferAttribute([-4, 0, 0, -4, 2.5, 0], 3))
          const m = new THREE.PointsMaterial({ color: 0xff4040, size: 1.2, sizeAttenuation: true, transparent: true, depthWrite: false })
          const p = new THREE.Points(g, m); p.frustumCulled = false
          scene.add(p)
        } catch (e) { out.errors.push('A構築: ' + e.message) }

        // B: Sprite + PointsNodeMaterial + インスタンス位置（r184の公式パターン）。右側に2点（緑）。
        //    丸抜き（旧 gl_PointCoord 相当）と、per-instance属性（明滅位相）も同時に検証。
        try {
          const posAttr = new THREE.InstancedBufferAttribute(new Float32Array([4, 0, 0, 4, 2.5, 0]), 3)
          const aphAttr = new THREE.InstancedBufferAttribute(new Float32Array([0, 3.14]), 1)
          const m = new THREE.PointsNodeMaterial()
          m.positionNode = TSL.instancedBufferAttribute(posAttr)
          const aph = TSL.instancedBufferAttribute(aphAttr)
          const dc = TSL.uv().sub(0.5).length() // 旧 gl_PointCoord-0.5 相当
          const alpha = TSL.smoothstep(0.5, 0.0, dc).mul(aph.sin().mul(0.25).add(0.75))
          m.colorNode = TSL.vec4(0.2, 1.0, 0.3, 1.0).mul(TSL.vec4(1, 1, 1, alpha))
          m.sizeNode = TSL.float(24)
          m.sizeAttenuation = false
          m.transparent = true
          m.depthWrite = false
          const sp = new THREE.Sprite(m)
          sp.count = 2
          sp.frustumCulled = false
          scene.add(sp)
          out.notes.push('B=Sprite+count+instancedBufferAttribute')
        } catch (e) { out.errors.push('B構築: ' + e.message) }

        // C: 中央に比較用の通常メッシュ（描けているかの生存確認）
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), new THREE.MeshBasicMaterial({ color: 0x4060ff })))

        // D: 毎フレーム更新される点群（雨・雪の移植前提の検証）。InterleavedBuffer共有＋needsUpdate転送で
        //    位置更新がGPUへ届くか＝1回目の描画後に位置を書き換え、右下(黄色)へ動けば合格。
        let dGeo = null
        try {
          const arr = new Float32Array([-6, -3, 0, -5, -3, 0])
          dGeo = new THREE.BufferGeometry()
          const ib = new THREE.InstancedInterleavedBuffer(arr, 3); ib.setUsage(THREE.DynamicDrawUsage)
          dGeo.setAttribute('position', new THREE.InterleavedBufferAttribute(ib, 3, 0))
          const m = new THREE.PointsNodeMaterial({ transparent: true, depthWrite: false })
          m.positionNode = TSL.instancedBufferAttribute(ib, 'vec3')
          m.colorNode = TSL.vec4(1.0, 0.9, 0.1, 1.0)
          m.sizeNode = TSL.float(18)
          m.sizeAttenuation = false
          const sp = new THREE.Sprite(m); sp.count = 2; sp.frustumCulled = false
          scene.add(sp)
          out.notes.push('D=動的InterleavedBuffer')
        } catch (e) { out.errors.push('D構築: ' + e.message) }

        await renderer.renderAsync(scene, cam)
        await new Promise((r) => requestAnimationFrame(r))
        // 位置を書き換えて needsUpdate（既存コードと同じ書き方: attributes.position.needsUpdate = true）
        if (dGeo) {
          const pa = dGeo.attributes.position
          pa.data.array[0] = 5.5; pa.data.array[1] = -3; pa.data.array[3] = 6.5; pa.data.array[4] = -3
          pa.needsUpdate = true
        }
        await renderer.renderAsync(scene, cam)

        // 画素を読み、赤/緑/青の点がどの大きさで描かれたかを数える
        try {
          const cv2 = document.createElement('canvas'); cv2.width = 640; cv2.height = 400
          const cx = cv2.getContext('2d')
          cx.drawImage(document.getElementById('cv'), 0, 0)
          const d = cx.getImageData(0, 0, 640, 400).data
          let red = 0, green = 0, blue = 0, yellowL = 0, yellowR = 0
          for (let i = 0; i < d.length; i += 4) {
            const r = d[i], g2 = d[i + 1], b = d[i + 2]
            const px = (i / 4) % 640
            if (r > 140 && g2 < 110 && b < 110) red++
            else if (g2 > 160 && r < 120) green++
            else if (b > 160 && r < 120) blue++
            else if (r > 180 && g2 > 150 && b < 110) { if (px < 320) yellowL++; else yellowR++ }
          }
          out.px = { red, green, blue, yellowL, yellowR } // 合格=yellowR>0 かつ yellowL≒0（更新が届き右へ動いた）
        } catch (e) { out.errors.push('画素読取: ' + e.message) }
      } catch (e) { out.errors.push('全体: ' + (e && e.message || e)) }
      window.__exp = out
    </script>
  </body>
</html>
