name: Deploy to GitHub Pages

# main へ push されるたびにビルドして Pages へ自動デプロイする。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を 1 つに絞る（古いデプロイは打ち切る）。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      # 全公開情景のスモークテスト（安全網）＝コンソールエラー/GLSLコンパイル失敗/マウント失敗があれば
      # ここで落としてデプロイを止める。回帰を手動qa頼みでなく自動で捕まえる（評価エンジニア最重要・分割の前提）。
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
