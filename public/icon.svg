<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 「窓のむこう」アイコン正本。夕暮れの薄暗い部屋から、開いた窓のむこうの町を猫と眺める。
       PNG書き出しは scripts/make-icons.mjs（maskable は #art を中央80%へ縮小して安全圏に収める）。 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2140"/>
      <stop offset="0.40" stop-color="#4a2f52"/>
      <stop offset="0.66" stop-color="#a05a5f"/>
      <stop offset="0.86" stop-color="#e8996a"/>
      <stop offset="1" stop-color="#f2b077"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe4ad" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#ffbd80" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffbd80" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20142a"/>
      <stop offset="0.7" stop-color="#241626"/>
      <stop offset="1" stop-color="#33202e"/>
    </linearGradient>
    <linearGradient id="sill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a614a"/>
      <stop offset="0.35" stop-color="#6b4a3a"/>
      <stop offset="1" stop-color="#4a3229"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#fff6ea" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#ffe9d2" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffe9d2" stop-opacity="0.06"/>
    </linearGradient>
    <clipPath id="opening"><rect x="84" y="72" width="344" height="356" rx="10"/></clipPath>
  </defs>

  <g id="art">
    <!-- 部屋の壁（暗がりの額縁） -->
    <rect width="512" height="512" fill="url(#wall)"/>

    <!-- 窓のむこうの景色（開口部でクリップ） -->
    <g clip-path="url(#opening)">
      <rect x="84" y="72" width="344" height="356" fill="url(#sky)"/>
      <!-- 沈む夕日とにじむ光 -->
      <circle cx="206" cy="330" r="150" fill="url(#sunGlow)"/>
      <circle cx="206" cy="330" r="30" fill="#ffe9c0" opacity="0.95"/>
      <circle cx="206" cy="330" r="40" fill="#ffd9a0" opacity="0.35"/>
      <!-- 一番星と星のこぼれ -->
      <path d="M150 118 L154 130 L166 134 L154 138 L150 150 L146 138 L134 134 L146 130 Z" fill="#fff8ec" opacity="0.92"/>
      <circle cx="256" cy="100" r="2.4" fill="#fff8ec" opacity="0.6"/>
      <circle cx="365" cy="132" r="2" fill="#fff8ec" opacity="0.45"/>
      <!-- 帰る鳥（夕空のシルエット） -->
      <g stroke="#33223c" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.75">
        <path d="M318 176 q9 -8 18 0 M336 176 q9 -8 18 0"/>
        <path d="M300 196 q7 -6 14 0 M314 196 q7 -6 14 0"/>
      </g>
      <!-- 遠い丘（うすい層） -->
      <path d="M84 352 Q170 322 240 344 T428 340 L428 428 L84 428 Z" fill="#3a2a44" opacity="0.85"/>
      <!-- 観覧車（遠くの灯り・この町のしるし） -->
      <g stroke="#2a1e34" stroke-width="4" fill="none" opacity="0.9">
        <circle cx="130" cy="316" r="22"/>
        <path d="M130 294 L130 338 M108 316 L152 316 M115 301 L145 331 M145 301 L115 331"/>
        <path d="M118 338 L130 316 L142 338"/>
      </g>
      <circle cx="130" cy="316" r="3.4" fill="#ffcf8e"/>
      <!-- 町のシルエットと、あたたかい窓明かり -->
      <path d="M84 392 L120 392 L134 376 L148 392 L184 392 L184 372 L206 356 L228 372 L228 392 L268 392 L282 378 L296 392 L330 392 L330 368 L352 352 L374 368 L374 392 L406 392 L418 380 L428 392 L428 428 L84 428 Z" fill="#2a1e34"/>
      <g fill="#ffcf8e">
        <rect x="140" y="384" width="6" height="7" rx="1"/>
        <rect x="199" y="368" width="7" height="8" rx="1" opacity="0.95"/>
        <rect x="214" y="380" width="6" height="7" rx="1" opacity="0.8"/>
        <rect x="286" y="386" width="6" height="6" rx="1" opacity="0.9"/>
        <rect x="345" y="364" width="7" height="8" rx="1"/>
        <rect x="360" y="378" width="6" height="7" rx="1" opacity="0.85"/>
        <rect x="411" y="386" width="6" height="6" rx="1" opacity="0.75"/>
      </g>
      <!-- そよ風にふくらむレースのカーテン（窓が開いているしるし） -->
      <path d="M428 72 L428 300 Q400 268 398 212 Q396 156 412 116 Q420 92 428 72 Z" fill="url(#curtain)"/>
      <path d="M428 72 L428 250 Q412 224 410 182 Q409 140 420 108 Q424 88 428 72 Z" fill="#fff6ea" opacity="0.22"/>
    </g>

    <!-- 窓の桟（クリーム色のサッシ・十字） -->
    <g stroke="#f2e9d8" fill="none" stroke-linecap="round">
      <rect x="84" y="72" width="344" height="356" rx="12" stroke-width="17"/>
      <line x1="256" y1="82" x2="256" y2="418" stroke-width="13"/>
      <line x1="94" y1="252" x2="418" y2="252" stroke-width="13"/>
    </g>
    <!-- サッシの夕日側のほのかな照り -->
    <g stroke="#ffd9a8" fill="none" stroke-linecap="round" opacity="0.35">
      <line x1="251" y1="86" x2="251" y2="414" stroke-width="3"/>
      <line x1="96" y1="247" x2="416" y2="247" stroke-width="3"/>
    </g>

    <!-- 窓台（木の板）と、すわる猫 -->
    <rect x="64" y="428" width="384" height="26" rx="8" fill="url(#sill)"/>
    <g>
      <!-- 猫の影がわずかに落ちる -->
      <ellipse cx="358" cy="431" rx="44" ry="6" fill="#160d1c" opacity="0.55"/>
      <!-- 猫（うしろ姿のすわり猫。頭・三角の耳・巻いたしっぽをはっきり） -->
      <path d="M330 430 Q328 396 342 382 Q348 375 356 374 Q364 375 370 382 Q384 396 382 430 Z" fill="#1c1220"/>
      <circle cx="356" cy="362" r="16.5" fill="#1c1220"/>
      <path d="M346 352 L342 335 L355 344 Z" fill="#1c1220"/>
      <path d="M366 352 L370 335 L357 344 Z" fill="#1c1220"/>
      <path d="M381 424 Q404 421 410 407 Q413 399 407 396 Q400 393 396 402 Q392 412 379 415 Z" fill="#1c1220"/>
      <!-- 夕日の縁光（夕日は左＝左の輪郭にリムライト） -->
      <path d="M344 351 Q341 358 341 363 M342 382 Q334 392 331 412" stroke="#ffb27a" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.65"/>
    </g>

    <!-- 部屋の下隅の、ほのかな明かりだまり -->
    <ellipse cx="256" cy="500" rx="270" ry="60" fill="#3a2030" opacity="0.5"/>
  </g>
</svg>
